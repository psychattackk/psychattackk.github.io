<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psychattackk - Focus Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-logo">psychattackk</a>
        <button class="navbar-toggle" id="mobile-menu">☰</button>
        <ul class="nav-links" id="nav-list">
            <li><a href="index.html">🏠 Home</a></li>
            <li><a href="reviews.html">🎬 Film & TV Reviews</a></li>
            <li><a href="index.html">⏱ Focus Timer</a></li>
            <li><a href="skills.html">💡 Skills</a></li>
        </ul>
    </nav>

    <main>
    <h1>Focus Timer</h1>
    <p>Enter a task to begin your session.</p>
    
    <div id="task-input">
        <input type="text" id="user-task" placeholder="What are you working on?">
    </div>

    <div id="timer-settings">
        <select id="minutes">
            <option value="25">25 Minutes</option>
            <option value="50">50 Minutes</option>
            <option value="5">5 Minutes (Break)</option>
        </select>
    </div>

    <div id="currentTask">Waiting for task...</div>
    <div id="timer">25:00</div>

    <div class="button-group">
        <button id="start-btn" class="btn">Start Timer</button>
        <button id="reset-btn" class="btn">Reset</button>
    </div>

    <div id="history-section" style="margin-top: 40px;">
        <h3 class="neon-title">Completed Tasks</h3>
        <ul id="task-list" style="list-style: none; padding: 0;"></ul>
    </div>
</main>
    <script src="script.js"></script>
    <audio id="alarm-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>
</body>
</html>
